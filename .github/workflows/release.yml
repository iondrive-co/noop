name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0). Leave blank to build the current ref.'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            task: packageDeb
            artifact_glob: build/compose/binaries/main/deb/*.deb
            asset_name: nop-linux
          - os: windows-latest
            task: packageMsi
            artifact_glob: build/compose/binaries/main/msi/*.msi
            asset_name: nop-windows
          - os: macos-latest
            task: packageDmg
            artifact_glob: build/compose/binaries/main/dmg/*.dmg
            asset_name: nop-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer (${{ matrix.task }})
        shell: bash
        run: ./gradlew ${{ matrix.task }} --no-daemon

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          mkdir -p release
          shopt -s nullglob
          files=( ${{ matrix.artifact_glob }} )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No artifacts matched ${{ matrix.artifact_glob }}" >&2
            exit 1
          fi
          for f in "${files[@]}"; do
            cp "$f" release/
            echo "Collected $f"
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          ls release/* >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/*
          retention-days: 14

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
